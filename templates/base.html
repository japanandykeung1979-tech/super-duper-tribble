<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>{% block title %}Telecom CRM{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --crm-primary: #1f3a5f;
      --crm-primary-dark: #152c4a;
      --crm-bg: #f3f5f8;
      --crm-surface: #ffffff;
      --crm-border: #d8dee8;
      --crm-text: #1e293b;
      --crm-shadow: 0 10px 30px rgba(31, 58, 95, .08);
    }

    body {
      background: var(--crm-bg);
      color: var(--crm-text);
      font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", "Heiti TC", sans-serif;
      font-size: 0.95rem;
    }
    .navbar {
      background: var(--crm-primary);
      border-bottom: 1px solid #10233f;
      box-shadow: var(--crm-shadow);
    }
    .navbar .navbar-brand,
    .navbar .nav-link {
      color: #fff;
    }
    .navbar .navbar-toggler {
      border-color: rgba(255, 255, 255, 0.5);
    }
    .navbar .navbar-toggler-icon {
      filter: brightness(0) invert(1);
    }
    .card {
      border: 1px solid var(--crm-border);
      border-radius: 14px;
      background: var(--crm-surface);
      box-shadow: var(--crm-shadow);
    }
    .btn {
      border-radius: 10px;
      font-weight: 600;
    }
    .btn-primary {
      background-color: var(--crm-primary);
      border-color: var(--crm-primary);
    }
    .btn-primary:hover {
      background-color: var(--crm-primary-dark);
      border-color: var(--crm-primary-dark);
    }
    .table thead {
      --bs-table-bg: #e9edf3;
      color: #10233f;
    }
    .table-responsive {
      font-size: .9rem;
    }
    .order-photo {
      max-width: 80px;
      max-height: 80px;
      object-fit: cover;
    }

    @media (max-width: 768px) {
      main.container { padding-inline: 0.8rem; }
      .table-responsive { font-size: .82rem; }
    }
  </style>
</head>
<body>
  {% if session.get('user') %}
  <nav class="navbar navbar-expand-lg mb-3">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="{{ url_for('dashboard') }}">Telecom CRM</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarContent">
        <div class="ms-lg-auto d-grid d-lg-flex gap-2 mt-2 mt-lg-0">
          <a class="btn btn-outline-light btn-sm" href="{{ url_for('mnp_form') }}">新增轉台</a>
          <a class="btn btn-light btn-sm" href="{{ url_for('dashboard') }}">Dashboard</a>
          <a class="btn btn-outline-light btn-sm" href="{{ url_for('appointments') }}">未登記及預約簽單</a>
          <a class="btn btn-outline-light btn-sm" href="{{ url_for('logout') }}">登出</a>
        </div>
      </div>
    </div>
  </nav>
  {% endif %}

  <main class="container pb-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
