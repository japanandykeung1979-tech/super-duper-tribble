<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Telecom CRM{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #eef6ff;
      color: #1f2d3d;
    }
    .navbar {
      background: #ffffff;
      border-bottom: 1px solid #d9e9ff;
    }
    .card {
      border: 1px solid #d9e9ff;
      border-radius: 12px;
    }
    .btn-primary {
      background-color: #3f8efc;
      border-color: #3f8efc;
    }
    .btn-primary:hover {
      background-color: #2d78e0;
      border-color: #2d78e0;
    }
    .table-responsive {
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  {% if session.get('user') %}
  <nav class="navbar navbar-expand-lg mb-3">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="{{ url_for('dashboard') }}">Telecom CRM</a>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-primary btn-sm" href="{{ url_for('mnp_form') }}">新增轉台</a>
        <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('dashboard') }}">Dashboard</a>
        <a class="btn btn-outline-danger btn-sm" href="{{ url_for('logout') }}">登出</a>
      </div>
    </div>
  </nav>
  {% endif %}

  <main class="container pb-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
