<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Telecom CRM{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --crm-primary: #1f3a5f;
      --crm-primary-dark: #152c4a;
      --crm-accent: #2f5f8f;
      --crm-bg: #f3f5f8;
      --crm-surface: #ffffff;
      --crm-border: #d8dee8;
      --crm-text: #1e293b;
    }

    body {
      background: var(--crm-bg);
      color: var(--crm-text);
      font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", "Heiti TC", sans-serif;
    }
    .navbar {
      background: var(--crm-primary);
      border-bottom: 1px solid #10233f;
    }
    .navbar .navbar-brand {
      color: #fff;
    }
    .navbar .navbar-brand:hover {
      color: #dbe7f5;
    }
    .card {
      border: 1px solid var(--crm-border);
      border-radius: 12px;
      background: var(--crm-surface);
    }
    .btn-primary {
      background-color: var(--crm-primary);
      border-color: var(--crm-primary);
    }
    .btn-primary:hover {
      background-color: var(--crm-primary-dark);
      border-color: var(--crm-primary-dark);
    }
    .btn-outline-primary {
      color: var(--crm-primary);
      border-color: var(--crm-primary);
    }
    .btn-outline-primary:hover {
      color: #fff;
      background-color: var(--crm-primary);
      border-color: var(--crm-primary);
    }
    .table thead {
      --bs-table-bg: #e9edf3;
      color: #10233f;
    }
    .table-responsive {
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  {% if session.get('user') %}
  <nav class="navbar navbar-expand-lg mb-3">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="{{ url_for('dashboard') }}">Telecom CRM</a>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-primary btn-sm" href="{{ url_for('mnp_form') }}">新增轉台</a>
        <a class="btn btn-light btn-sm" href="{{ url_for('dashboard') }}">Dashboard</a>
        <a class="btn btn-outline-light btn-sm" href="{{ url_for('logout') }}">登出</a>
      </div>
    </div>
  </nav>
  {% endif %}

  <main class="container pb-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
